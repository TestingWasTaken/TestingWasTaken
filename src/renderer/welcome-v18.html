<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Conduit home</title>
  <style>
    * { box-sizing: border-box; }
    :root { color-scheme: dark; }
    body {
      margin: 0;
      background: #111216;
      color: #f5f5f7;
      font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    }
    main { width: min(560px, calc(100% - 40px)); margin: 34px auto 70px; }
    .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .mark { position: relative; width: 25px; height: 17px; transform: rotate(-8deg) skew(-8deg); }
    .mark::before, .mark::after {
      content: "";
      position: absolute;
      top: 2px;
      width: 12px;
      height: 8px;
      border: 2px solid #0a84ff;
      border-radius: 6px;
    }
    .mark::before { left: 0; }
    .mark::after { right: 0; }
    h1 { margin: 0; font-size: 24px; font-style: italic; letter-spacing: -.035em; transform: skew(-8deg); }
    p { margin: 0 0 22px; color: #a1a1a7; }
    section { padding-top: 18px; border-top: 1px solid #34353b; }
    label { display: block; margin: 13px 0 5px; }
    input[type="text"], select, button {
      height: 34px;
      border: 1px solid #45464e;
      border-radius: 6px;
      background: #1d1e23;
      color: inherit;
      font: inherit;
    }
    input[type="text"] { width: 100%; padding: 0 9px; }
    select { min-width: 160px; padding: 0 8px; }
    button { padding: 0 12px; cursor: pointer; }
    .inline { display: flex; flex-wrap: wrap; align-items: center; gap: 12px; margin-top: 14px; }
    .inline label { display: inline-flex; align-items: center; gap: 6px; margin: 0; }
    .scroll-space { height: 560px; margin-top: 28px; padding-top: 12px; border-top: 1px solid #34353b; color: #7f8088; font-size: 12px; }
    .counter-row { display: flex; align-items: center; justify-content: flex-end; gap: 8px; padding: 12px 0 16px; border-top: 1px solid #34353b; }
    #count { min-width: 18px; font-weight: 700; text-align: center; }
    #increment { min-width: 44px; color: white; border-color: #0a84ff; background: #0a84ff; }
    footer { padding-top: 12px; border-top: 1px solid #34353b; color: #7f8088; font-size: 11px; }
  </style>
</head>
<body>
  <main>
    <div class="brand"><span class="mark" aria-hidden="true"></span><h1>Conduit</h1></div>
    <p>This local page checks typing, choices, clicks, and scrolling from Pane 1.</p>

    <section>
      <label for="message">Text</label>
      <input id="message" type="text" placeholder="Type here" />

      <div class="inline">
        <label><input id="enabled" type="checkbox" /> Checkbox</label>
        <select id="choice" aria-label="Test option">
          <option>First option</option>
          <option>Second option</option>
          <option>Third option</option>
        </select>
      </div>
    </section>

    <div class="scroll-space">Scroll down to check follower movement.</div>
    <div class="counter-row"><span>Count</span><span id="count">0</span><button id="increment">+1</button></div>
    <footer>⌘, opens Settings · ⌘1–8 focuses a pane</footer>
  </main>

  <script>
    let count = 0;
    document.querySelector('#increment').addEventListener('click', () => {
      count += 1;
      document.querySelector('#count').textContent = String(count);
    });
  </script>
</body>
</html>
