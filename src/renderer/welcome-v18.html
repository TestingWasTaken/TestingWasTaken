<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Conduit home</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #f7f7f8;
      color: #1d1d1f;
      font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    }
    main { width: min(560px, calc(100% - 40px)); margin: 34px auto 70px; }
    h1 { margin: 0 0 6px; font-size: 24px; letter-spacing: -.025em; }
    p { margin: 0 0 22px; color: #6e6e73; }
    section { padding-top: 18px; border-top: 1px solid #d2d2d7; }
    label { display: block; margin: 13px 0 5px; }
    input[type="text"], select, button {
      height: 34px;
      border: 1px solid #c7c7cc;
      border-radius: 6px;
      background: #fff;
      color: inherit;
      font: inherit;
    }
    input[type="text"] { width: 100%; padding: 0 9px; }
    select { min-width: 160px; padding: 0 8px; }
    button { padding: 0 12px; cursor: pointer; }
    .inline { display: flex; flex-wrap: wrap; align-items: center; gap: 12px; margin-top: 14px; }
    .inline label { display: inline-flex; align-items: center; gap: 6px; margin: 0; }
    #count { font-weight: 650; }
    .scroll-space { height: 560px; margin-top: 28px; padding-top: 12px; border-top: 1px solid #d2d2d7; color: #8e8e93; font-size: 12px; }
    footer { padding-top: 12px; border-top: 1px solid #d2d2d7; color: #8e8e93; font-size: 11px; }
  </style>
</head>
<body>
  <main>
    <h1>Conduit</h1>
    <p>This local page is for checking whether Pane 1 is following correctly.</p>

    <section>
      <label for="message">Text</label>
      <input id="message" type="text" placeholder="Type here" />

      <div class="inline">
        <label><input id="enabled" type="checkbox" /> Checkbox</label>
        <select id="choice" aria-label="Test option">
          <option>First option</option>
          <option>Second option</option>
          <option>Third option</option>
        </select>
        <button id="increment">Add one</button>
        <span>Count: <span id="count">0</span></span>
      </div>
    </section>

    <div class="scroll-space">Scroll down to check follower movement.</div>
    <footer>⌘, opens Settings · ⌘1–8 focuses a pane</footer>
  </main>

  <script>
    let count = 0;
    document.querySelector('#increment').addEventListener('click', () => {
      count += 1;
      document.querySelector('#count').textContent = String(count);
    });
  </script>
</body>
</html>
